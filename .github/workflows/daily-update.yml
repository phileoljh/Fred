name: Daily FRED Update

# 設定觸發條件
on:
  # 註解掉 GitHub Actions 排程，改由 Cloudflare Workers 負責自動觸發
  # schedule:
    # - cron: '30 0 * * *'
  # 允許手動觸發此工作流程，方便測試
  workflow_dispatch:

jobs:
  trigger-cloudflare:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages Build
        # 使用 curl 發送 POST 請求給 Cloudflare，網址從機密變數中安全讀取
        run: curl -X POST "${{ secrets.CF_DEPLOY_HOOK }}"
